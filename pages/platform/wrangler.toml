# pages/platform/wrangler.toml
# Serves platform.headorn.com (one project, path-based routing):
#   /            → index.html  (signup)
#   /onboarding  → onboarding.html
#   /dashboard   → dashboard.html  (platform owner admin — future)
#   /auth-error  → auth-error.html
#
# In Cloudflare dashboard: Settings > Custom domains > platform.headorn.com

name = "solostore-platform"
pages_build_output_dir = "src"
compatibility_date = "2024-05-29"

[dev]
port = 8789

# Production deploy:
#   node_modules/.bin/wrangler pages deploy src --project-name solostore-platform