name = "solostore-webhooks"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8788

[[kv_namespaces]]
binding = "SOLOSTORE_KV"
id = "f71e79c3fcc24c8c8516ddfbc5ed050d"
preview_id = "c0b19f5d88de4dce8ba7ffd706704c04"

[triggers]
crons = ["* * * * *"]

[vars]
ENVIRONMENT = "development"
RESEND_FROM = "SoloStore <onboarding@headorn.com>"
API_BASE_URL = "http://localhost:8787"

# Secrets (set via `wrangler secret put`):
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   STRIPE_CONNECT_WEBHOOK_SECRET
#   RESEND_API_KEY

[env.production]
name = "solostore-webhooks-production"

[env.production.vars]
ENVIRONMENT = "production"
RESEND_FROM = "SoloStore <onboarding@headorn.com>"
API_BASE_URL = "https://api.headorn.com"

[[env.production.kv_namespaces]]
binding = "SOLOSTORE_KV"
id = "f71e79c3fcc24c8c8516ddfbc5ed050d"

[[env.production.routes]]
pattern = "hooks.headorn.com/*"
zone_name = "headorn.com"