name = "solostore-router"
main = "src/index.ts"
compatibility_date = "2024-05-29"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8786

[[kv_namespaces]]
binding = "SOLOSTORE_KV"
id = "f71e79c3fcc24c8c8516ddfbc5ed050d"
preview_id = "c0b19f5d88de4dce8ba7ffd706704c04"

# Dashboard static assets (HTML/CSS/JS) — served directly by this Worker.
# Cloudflare checks this directory for a matching file BEFORE running
# fetch(); run_worker_first ensures our tenant-resolution + status gate
# in src/index.ts always runs first, so an unauthenticated/inactive
# tenant can never reach dashboard files directly by path.
[assets]
directory = "./public"
binding = "ASSETS"
run_worker_first = true

[vars]
ENVIRONMENT = "development"
API_WORKER_URL = "http://localhost:8787"

# Production environment overrides
[env.production]
name = "solostore-router-production"

[env.production.vars]
ENVIRONMENT = "production"
API_WORKER_URL = ""  # not used in prod — service binding used instead

[[env.production.kv_namespaces]]
binding = "SOLOSTORE_KV"
id = "f71e79c3fcc24c8c8516ddfbc5ed050d"
