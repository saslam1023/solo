# workers/api/wrangler.toml

name = "solostore-api"
main = "src/index.ts"
compatibility_date = "2024-05-29"
compatibility_flags = ["nodejs_compat"]

[dev]
port = 8787

[[kv_namespaces]]
binding = "SOLOSTORE_KV"
id = "f71e79c3fcc24c8c8516ddfbc5ed050d"
preview_id = "c0b19f5d88de4dce8ba7ffd706704c04"

[[r2_buckets]]
binding = "SOLOSTORE_R2"
bucket_name = "solostore-assets"
preview_bucket_name = "solostore-assets-preview"

[vars]
ENVIRONMENT = "development"
API_BASE_URL="http://localhost:8787"
RESEND_FROM = "SoloStore <onboarding@headorn.com>"

# Secrets — set via `wrangler secret put`:
#   STRIPE_SECRET_KEY
#   STRIPE_WEBHOOK_SECRET
#   STRIPE_CONNECT_WEBHOOK_SECRET
#   RESEND_API_KEY
#   SESSION_SECRET
#   R2_PUBLIC_URL   (set in .dev.vars for local — https://pub-xxx.r2.dev)

[env.production]
name = "solostore-api-production"

[env.production.vars]
ENVIRONMENT = "production"
API_BASE_URL = "https://api.headorn.com"
RESEND_FROM = "SoloStore <onboarding@headorn.com>"

[[env.production.kv_namespaces]]
binding = "SOLOSTORE_KV"
id = "f71e79c3fcc24c8c8516ddfbc5ed050d"

[[env.production.r2_buckets]]
binding = "SOLOSTORE_R2"
bucket_name = "solostore-assets"

[[env.production.routes]]
pattern = "api.headorn.com/*"
zone_name = "headorn.com"

[[env.production.routes]]
pattern = "headorn.com/register"
zone_name = "headorn.com"

[[env.production.routes]]
pattern = "headorn.com/register/*"
zone_name = "headorn.com"

[[env.production.routes]]
pattern = "headorn.com/auth/*"
zone_name = "headorn.com"

[[env.production.routes]]
pattern = "headorn.com/connect/*"
zone_name = "headorn.com"

[observability]
enabled = true